<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizRush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="header">
    <h1>QuizRush 🎮</h1>
    <p class="tagline">Challenge your brain. Beat your score.</p>
  </header>

  <main class="quiz-container">

    <div class="top-bar">
      <span id="progress">Question 1 / 5</span>
      <span id="score">Score: 0</span>
    </div>

    <h2 id="question">Loading question...</h2>

    <div id="answers" class="answers">
      <!-- Buttons will be added by JavaScript -->
    </div>

    <div class="controls">
      <button id="nextBtn">Next Question →</button>
    </div>

  </main>

  <footer class="footer">
    <p>© 2026 QuizRush | Built for learning 🚀</p>
  </footer>

</div>

<script src="script.js"></script>

</body>
</html>
