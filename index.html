<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizRush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="header">
    <h1>QuizRush ⚡</h1>
    <p class="tagline">Fast thinking. Sharp mind.</p>
  </header>

  <main class="quiz-container">

    <div class="top-bar">
      <span id="progress"></span>
      <span id="score"></span>
    </div>

    <h2 id="question" class="fade-in">Loading...</h2>

    <div id="answers" class="answers"></div>

    <button id="nextBtn" class="next-btn">Next →</button>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
